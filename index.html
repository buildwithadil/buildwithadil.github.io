<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta
      name="google-site-verification"
      content="gsZNqhud1FMDiVQiJXwOSYEJIAUQEbQLVBkmSnnCuXE"
    />
    <meta name="msvalidate.01" content="DC11BB54FDA287FDC5D3A4AC55E5F0EB" />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0a0a0b"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="preload"
      href="/fonts/satoshi-variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/inter-variable-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <script>
      // Runs before paint: set theme (no FOUC) and mark that JS is available so
      // scroll-reveal only hides content when it can also reveal it.
      ;(function () {
        var el = document.documentElement
        el.classList.add('js')
        try {
          // Light is the default; dark only when the visitor has chosen it.
          var stored = localStorage.getItem('theme')
          el.dataset.theme = stored === 'dark' ? 'dark' : 'light'
        } catch (e) {
          el.dataset.theme = 'light'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
